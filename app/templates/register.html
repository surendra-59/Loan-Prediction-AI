<!DOCTYPE html>
<html>

<head>
    <title>Register · LoanPredict Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 560px;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: #666;
            font-size: 14px;
            font-weight: 400;
        }

        .header .subtitle span {
            color: #667eea;
            font-weight: 600;
        }

        .messages {
            margin-bottom: 24px;
        }

        .message {
            background: #fee;
            border-left: 4px solid #f44336;
            color: #d32f2f;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease-in-out;
        }

        .message.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .message.success:before {
            content: "✓";
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-2px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(2px);
            }
        }

        .message:before {
            content: "⚠️";
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #999;
            font-size: 18px;
            pointer-events: none;
            z-index: 1;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input:hover {
            border-color: #999;
        }

        input::placeholder {
            color: #aaa;
            font-size: 14px;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 18px;
            transition: color 0.3s ease;
            background: none;
            border: none;
            padding: 0;
            z-index: 2;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 28px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-group label {
            margin-bottom: 0;
            text-transform: none;
            font-weight: 500;
            color: #555;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
            line-height: 1.5;
        }

        .checkbox-group a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px solid #f0f0f0;
        }

        .footer p {
            color: #666;
            font-size: 15px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            position: relative;
        }

        .footer a:hover {
            color: #764ba2;
        }

        .footer a:after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .footer a:hover:after {
            width: 100%;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }

        .features span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .features span:before {
            content: "✓";
            color: #4caf50;
            font-weight: bold;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 4px;
            text-align: right;
            color: #666;
        }

        .password-match {
            font-size: 12px;
            margin-top: 4px;
            min-height: 18px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h2 {
                font-size: 28px;
            }

            input {
                padding: 12px 16px 12px 44px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>📝 Create Account</h2>
            <div class="subtitle">Join <span>LoanPredict Pro</span> today</div>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {% if message.tags == 'success' %}success{% endif %}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" id="registrationForm">
            {% csrf_token %}

            <!-- FULL NAME -->
            <div class="form-group">
                <label>FULL NAME</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" name="full_name" placeholder="John Doe" required pattern="[A-Za-z\s]+"
                        title="Name should contain only alphabets and spaces">
                </div>
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
            </div>

            <!-- PHONE -->
            <div class="form-group">
                <label>PHONE NUMBER</label>
                <div class="input-wrapper">
                    <span class="input-icon">📱</span>
                    <input type="tel" name="phone_number" placeholder="98XXXXXXXX" required pattern="9[0-9]{9}"
                        title="Phone number must start with 9 and be exactly 10 digits">
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label>PASSWORD</label>
                <div class="password-wrapper">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="password" id="password" placeholder="Create a password" required>
                    </div>
                    <button type="button" class="toggle-password" onclick="togglePassword(this,'password')">👁️</button>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="passwordStrength"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-group">
                <label>CONFIRM PASSWORD</label>
                <div class="password-wrapper">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="confirm_password" id="confirm_password"
                            placeholder="Confirm password" required>
                    </div>
                    <button type="button" class="toggle-password"
                        onclick="togglePassword(this,'confirm_password')">👁️</button>
                </div>
                <div class="password-match" id="passwordMatch"></div>
            </div>

            <!-- TERMS -->
            <div class="checkbox-group">
                <input type="checkbox" name="terms" id="terms" required>
                <label for="terms">I agree to the <a href="/terms/" target="_blank">Terms & Conditions</a> and <a
                        href="/privacy/" target="_blank">Privacy Policy</a></label>
            </div>

            <button type="submit">CREATE ACCOUNT →</button>
        </form>

        <div class="footer">
            <p>Already have an account? <a href="/login/">Sign In</a></p>
            <div class="features">
                <span>Secure SSL</span>
                <span>24/7 Support</span>
                <span>Instant Access</span>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(button, fieldId) {
            const passwordInput = document.getElementById(fieldId);
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                button.textContent = '🔓';
            } else {
                passwordInput.type = 'password';
                button.textContent = '👁️';
            }
        }

        const password = document.getElementById('password');
        const strengthBar = document.getElementById('passwordStrength');
        const strengthText = document.getElementById('strengthText');

        password.addEventListener('input', function () {
            const val = this.value;
            let strength = 0;
            if (val.length >= 8) strength += 25;
            if (val.match(/[a-z]+/)) strength += 25;
            if (val.match(/[A-Z]+/)) strength += 25;
            if (val.match(/[0-9]+/)) strength += 25;
            if (val.match(/[$@#&!]+/)) strength += 25;
            strengthBar.style.width = Math.min(strength, 100) + '%';
            if (strength < 50) { strengthBar.style.backgroundColor = '#f44336'; strengthText.textContent = 'Weak password'; strengthText.style.color = '#f44336'; }
            else if (strength < 75) { strengthBar.style.backgroundColor = '#ff9800'; strengthText.textContent = 'Medium password'; strengthText.style.color = '#ff9800'; }
            else { strengthBar.style.backgroundColor = '#4caf50'; strengthText.textContent = 'Strong password'; strengthText.style.color = '#4caf50'; }
        });

        const confirmPassword = document.getElementById('confirm_password');
        const passwordMatch = document.getElementById('passwordMatch');

        function checkPasswordMatch() {
            if (password.value && confirmPassword.value) {
                if (password.value === confirmPassword.value) { passwordMatch.textContent = '✓ Passwords match'; passwordMatch.style.color = '#4caf50'; }
                else { passwordMatch.textContent = '✗ Passwords do not match'; passwordMatch.style.color = '#f44336'; }
            } else { passwordMatch.textContent = ''; }
        }

        password.addEventListener('keyup', checkPasswordMatch);
        confirmPassword.addEventListener('keyup', checkPasswordMatch);

        document.getElementById('registrationForm').addEventListener('submit', function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                alert('Passwords do not match!');
                return;
            }
            if (!document.getElementById('terms').checked) {
                e.preventDefault();
                alert('Please agree to the Terms & Conditions');
            }
        });
    </script>
</body>

</html>
