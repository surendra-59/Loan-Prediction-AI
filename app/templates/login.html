<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login · LoanPredict Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset & base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* Container */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity:0; transform:translateY(20px); } 
            to { opacity:1; transform:translateY(0); }
        }

        /* Header */
        .header { text-align: center; margin-bottom: 40px; }
        .header h2 { font-size: 32px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; letter-spacing: -0.5px; }
        .header .subtitle { color: #666; font-size: 14px; font-weight: 400; }
        .header .subtitle span { color: #667eea; font-weight: 600; }

        /* Toast container */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        /* Toast message styles (matches your previous .message style) */
        .toast-message {
            background: #fee;
            border-left: 4px solid #f44336;
            color: #d32f2f;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease-in-out;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .toast-message:before { content:"⚠️"; font-size:16px; }

        @keyframes shake {
            0%,100%{transform:translateX(0);} 10%,30%,50%,70%,90%{transform:translateX(-2px);} 20%,40%,60%,80%{transform:translateX(2px);}
        }

        /* Form */
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 16px; color: #999; font-size: 18px; pointer-events: none; }
        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); }
        input:hover { border-color: #999; }
        input::placeholder { color: #aaa; font-size: 14px; }

        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 18px;
            background: none;
            border: none;
            transition: color 0.3s ease;
        }
        .toggle-password:hover { color: #667eea; }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.5); }
        button[type="submit"]:active { transform: translateY(0); }

        /* Footer */
        .footer { text-align: center; margin-top: 32px; padding-top: 24px; border-top: 2px solid #f0f0f0; }
        .footer p { color: #666; font-size: 15px; }
        .footer a { color: #667eea; text-decoration: none; font-weight: 600; position: relative; transition: color 0.3s ease; }
        .footer a:hover { color: #764ba2; }
        .footer a:after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        .footer a:hover:after { width: 100%; }

        /* Features */
        .features { display: flex; justify-content: center; gap: 16px; margin-top: 24px; font-size: 12px; color: #999; }
        .features span { display: flex; align-items: center; gap: 4px; }
        .features span:before { content: "✓"; color: #4caf50; font-weight: bold; }

        @media (max-width:480px) {
            .container { padding: 30px 20px; }
            .header h2 { font-size: 28px; }
            input { padding: 12px 16px 12px 44px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🔐 Login</h2>
            <div class="subtitle">Welcome back to <span>LoanPredict Pro</span></div>
        </div>

        <!-- Login form -->
        <form method="POST" id="loginForm">
            {% csrf_token %}

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password visibility">👁️</button>
                </div>
            </div>

            <button type="submit">Access Dashboard →</button>
        </form>

        <div class="footer">
            <p>Don't have an account? <a href="/register/">Create Account</a></p>
            <div class="features">
                <span>Secure SSL</span>
                <span>24/7 Support</span>
                <span>Instant Access</span>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleButton = document.querySelector('.toggle-password');
            if(passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleButton.textContent = '🔓';
            } else {
                passwordInput.type = 'password';
                toggleButton.textContent = '👁️';
            }
        }

        // Display Django messages as temporary toast notifications
        {% if messages %}
        const toastContainer = document.getElementById('toast-container');
        {% for message in messages %}
        const toast = document.createElement('div');
        toast.className = "toast-message";
        toast.textContent = "{{ message }}";
        toastContainer.appendChild(toast);

        // Show toast with fade-in
        setTimeout(() => { toast.style.opacity = "1"; }, 100);

        // Hide toast after 2 seconds
        setTimeout(() => {
            toast.style.opacity = "0";
            setTimeout(() => { toast.remove(); }, 500);
        }, 2000);
        {% endfor %}
        {% endif %}
    </script>
</body>
</html>
